<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Acc Killua</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; }
        .bg-card { background-color: #161b22; }
    </style>
</head>
<body class="pb-24">

    <div class="p-6 text-center">
        <h1 class="text-2xl font-bold">Shop Acc Killua</h1>
        <p class="text-gray-400">@zerestmods</p>
    </div>

    <div class="p-4">
        <div class="bg-card p-5 rounded-2xl border border-gray-700">
            <h2 class="font-bold mb-4 text-yellow-500">💳 Nạp tiền</h2>
            <input type="number" id="amount" placeholder="Nhập số tiền..." class="w-full bg-[#0d1117] border border-gray-600 p-3 rounded-lg text-white mb-4">
            <button onclick="generateQR()" class="w-full bg-[#3b82f6] py-3 rounded-lg font-bold">Tạo đơn nạp</button>
            
            <div id="qr-result" class="mt-6 text-center hidden">
                <img id="qr-img" src="" class="mx-auto w-64 h-64 bg-white p-2 rounded-lg">
                <p class="text-xs text-gray-400 mt-4 italic">Hãy chuyển khoản đúng số tiền và nội dung!</p>
            </div>
        </div>
    </div>

    <div class="p-4">
        <div class="bg-card p-4 rounded-2xl border border-gray-700 mb-4">
            <p class="font-bold">KMODS (FREE FIRE)</p>
            <div class="mt-3 text-sm text-gray-400 border-t border-gray-700 pt-3">
                <div class="flex justify-between py-1"><span>1 tháng</span><span>130.000đ</span></div>
                <div class="flex justify-between py-1"><span>1 tuần</span><span>65.000đ</span></div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 w-full bg-[#161b22] border-t border-gray-700 flex justify-around p-4 text-xs font-bold text-gray-400">
        <span>🛒 Mua Key</span>
        <span class="text-blue-500">💰 Nạp tiền</span>
        <span>📋 Lịch sử</span>
        <span>👤 Hồ sơ</span>
    </div>

    <script>
        function generateQR() {
            let amount = document.getElementById('amount').value;
            let bank = "MOMO"; 
            let stk = "0901371650";
            let url = "https://img.vietqr.io/image/" + bank + "-" + stk + "-compact2.png?amount=" + amount + "&addInfo=NAP" + Math.floor(Math.random() * 1000000);
            document.getElementById('qr-img').src = url;
            document.getElementById('qr-result').classList.remove('hidden');
        }
    </script>
</body>
</html>
