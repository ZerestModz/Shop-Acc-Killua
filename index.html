<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Acc Killua</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; }
        .bg-card { background-color: #161b22; }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <div class="p-6 text-center border-b border-gray-700">
        <h1 class="text-2xl font-bold">Shop Acc Killua</h1>
        <p class="text-gray-400">@zerestmods</p>
    </div>

    <!-- Khu vực nạp tiền tự động -->
    <div class="p-4">
        <div class="bg-card p-4 rounded-xl border border-gray-700 text-center">
            <h2 class="font-bold mb-4 text-pink-500">💰 Nạp tiền qua MoMo</h2>
            
            <p class="text-sm text-gray-300 mb-2">Ví MoMo: <b>0901371650</b></p>
            <p class="text-sm text-gray-300 mb-4">Chủ ví: <b>DUONG THI TU TRINH</b></p>
            
            <input type="number" id="amount" placeholder="Nhập số tiền (VD: 50000)" class="text-black p-3 rounded-lg w-full mb-4 border border-gray-500">
            
            <button onclick="generateQR()" class="bg-pink-600 w-full py-3 rounded-lg font-bold mb-4">Tạo mã QR thanh toán</button>
            
            <div id="qr-result" class="mt-4">
                <p id="msg" class="text-sm text-gray-400 mb-2">Nhập số tiền và nhấn nút để tạo mã.</p>
                <img id="qr-img" src="" class="mx-auto w-64 h-64 bg-white p-2 rounded hidden">
            </div>
            
            <p class="text-xs text-red-400 mt-4 italic">* Nội dung chuyển khoản sẽ được tự động tạo kèm theo.</p>
        </div>
    </div>

    <!-- Script tạo QR -->
    <script>
        function generateQR() {
            let amount = document.getElementById('amount').value;
            if (amount < 10000) { alert("Số tiền tối thiểu là 10.000đ"); return; }
            
            // Thông tin MoMo của bạn
            let phone = "0901371650"; 
            let name = "DUONG THI TU TRINH";
            
            // Link tạo QR qua VietQR (Hỗ trợ MoMo chuyển khoản)
            // Lưu ý: VietQR thường dùng cho Bank. Nếu dùng ví MoMo, hãy đảm bảo khách quét bằng app ngân hàng có hỗ trợ chuyển vào ví MoMo.
            let url = "https://img.vietqr.io/image/MOMO-" + phone + "-compact2.png?amount=" + amount + "&addInfo=NAP" + Math.floor(Math.random() * 1000000);
            
            let img = document.getElementById('qr-img');
            let msg = document.getElementById('msg');
            img.src = url;
            img.classList.remove('hidden');
            msg.innerText = "Quét QR để thanh toán " + new Intl.NumberFormat('vi-VN').format(amount) + "đ";
        }
    </script>

    <!-- Menu Bar -->
    <div class="fixed bottom-0 w-full bg-[#161b22] border-t border-gray-700 flex justify-around p-4 text-xs text-gray-400">
        <span>🛒 Mua Key</span>
        <span class="text-pink-500 font-bold">💰 Nạp tiền</span>
        <span>📋 Lịch sử</span>
        <span>👤 Hồ sơ</span>
    </div>

</body>
</html>
