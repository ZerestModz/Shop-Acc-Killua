<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Acc Killua</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #f59e0b; --bg-dark: #0b0e14; --card-bg: #161c27; }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Hiệu ứng Glassmorphism */
        .glass-card { background: var(--card-bg); border: 1px solid #2d3748; border-radius: 24px; }
        .gradient-btn { background: linear-gradient(90deg, var(--primary), #d97706); transition: 0.3s; }
        .gradient-btn:active { transform: scale(0.96); }

        /* Animation chuyển tab */
        .tab-content { display: none; opacity: 0; transition: opacity 0.3s; }
        .tab-content.active { display: block; opacity: 1; }

        /* Scrollbar ẩn */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 text-center">
        <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500">Shop Acc Killua</h1>
        <p class="text-slate-400 text-sm">@zerestmods - Uy tín - Chất lượng</p>
    </header>

    <section id="tab1" class="tab-content active p-4 space-y-4">
        <h2 class="font-bold mb-2">Danh sách sản phẩm</h2>
        <div class="glass-card p-5 flex items-center justify-between">
            <div>
                <p class="font-bold text-lg">Acc Level 30</p>
                <p class="text-yellow-500 text-sm">Rank Huyền Thoại</p>
            </div>
            <button class="bg-white text-black px-6 py-2 rounded-full font-bold">Mua</button>
        </div>
    </section>

    <section id="tab2" class="tab-content p-4">
        <div class="glass-card p-6 space-y-6">
            <div class="space-y-2 text-center">
                <p class="text-slate-400 text-sm">Số tài khoản MoMo</p>
                <p class="text-2xl font-bold tracking-widest">0901371650</p>
                <p class="text-slate-400 text-sm">Chủ tài khoản: <span class="text-white">DUONG THI TU TRINH</span></p>
            </div>
            <input type="number" id="amount" placeholder="Nhập số tiền..." class="w-full bg-[#0b0e14] border border-slate-700 p-4 rounded-xl text-center text-xl outline-none focus:border-yellow-500">
            <button onclick="generateQR()" class="gradient-btn w-full py-4 rounded-xl font-bold text-lg shadow-xl">TẠO MÃ QR NẠP TIỀN</button>
        </div>
    </section>

    <div id="qr-modal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-6">
        <div class="glass-card w-full p-6 text-center animate-in fade-in zoom-in duration-300">
            <h3 class="font-bold text-lg mb-4">Mã QR Thanh Toán</h3>
            <img id="qr-img" src="" class="w-full bg-white p-2 rounded-2xl mb-4">
            <div class="bg-[#0b0e14] p-4 rounded-xl border border-slate-700 text-left mb-6">
                <p class="text-slate-400 text-xs">Nội dung chuyển khoản:</p>
                <p class="text-yellow-500 font-bold text-lg select-all" id="nap-code">NAPXXXXXX</p>
            </div>
            <button onclick="closeModal()" class="w-full bg-slate-700 py-3 rounded-xl font-bold">Đóng & Hủy</button>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-[#161c27] border-t border-slate-700 flex justify-around p-4">
        <button onclick="changeTab(1)" class="text-xs text-slate-400 flex flex-col items-center">🛒 Mua Key</button>
        <button onclick="changeTab(2)" class="text-xs text-yellow-500 flex flex-col items-center">💰 Nạp Tiền</button>
        <button onclick="changeTab(3)" class="text-xs text-slate-400 flex flex-col items-center">📋 Lịch sử</button>
    </nav>

    <script>
        // Xử lý Tab
        function changeTab(n) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab'+n).classList.add('active');
        }

        // Xử lý QR
        function generateQR() {
            const amount = document.getElementById('amount').value;
            if(!amount || amount < 10000) return alert("Nhập tối thiểu 10.000đ");
            const code = "NAP" + Math.floor(100000 + Math.random() * 900000);
            document.getElementById('nap-code').innerText = code;
            document.getElementById('qr-img').src = `https://img.vietqr.io/image/MB-0901371650-compact2.png?amount=${amount}&addInfo=${code}`;
            document.getElementById('qr-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('qr-modal').classList.add('hidden'); }
        
        // Khởi tạo Mini App
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#0b0e14');
    </script>
</body>
</html>
