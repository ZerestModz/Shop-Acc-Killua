<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Acc Killua</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .tab-content { display: none; }
        .active { display: block; }
        .glass { background: rgba(20, 20, 20, 0.9); border-bottom: 1px solid #333; }
    </style>
</head>
<body class="pb-24">

    <div id="tab1" class="tab-content active p-4">
        <h2 class="text-xl font-bold mb-4">🛒 Mua Key</h2>
        <div class="bg-card p-4 rounded-2xl border border-gray-800">
            <p>Acc Rank Chiến Thần - 50.000đ</p>
            <button class="w-full mt-3 bg-blue-600 py-2 rounded-lg font-bold">Mua ngay</button>
        </div>
    </div>

    <div id="tab2" class="tab-content p-4">
        <h2 class="text-xl font-bold mb-4">💰 Nạp tiền</h2>
        <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800">
            <input type="number" id="amount" placeholder="Nhập số tiền..." class="w-full bg-black p-3 rounded-xl mb-4 border border-gray-700">
            <button onclick="generateQR()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Tạo mã nạp</button>
            <div id="qr-result" class="mt-4 text-center hidden">
                <img id="qr-img" src="" class="mx-auto w-56 h-56 bg-white p-2 rounded-xl">
            </div>
        </div>
    </div>

    <div id="tab3" class="tab-content p-4">
        <h2 class="text-xl font-bold mb-4">📋 Lịch sử</h2>
        <p class="text-gray-500">Chưa có giao dịch nào.</p>
    </div>

    <div class="fixed bottom-0 w-full glass flex justify-around p-4 text-xs font-bold text-gray-400">
        <button onclick="showTab(1)">🛒 Key</button>
        <button onclick="showTab(2)" class="text-blue-500">💰 Nạp</button>
        <button onclick="showTab(3)">📋 Lịch sử</button>
    </div>

    <script>
        function showTab(n) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active');
        }

        function generateQR() {
            let amount = document.getElementById('amount').value;
            if(amount < 10000) return alert("Tối thiểu 10k");
            let url = "https://img.vietqr.io/image/MOMO-0901371650-compact2.png?amount=" + amount + "&addInfo=NAP" + Math.floor(Math.random()*1000000);
            document.getElementById('qr-img').src = url;
            document.getElementById('qr-result').classList.remove('hidden');
        }
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
